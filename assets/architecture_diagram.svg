<text x="125" y="236" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(150,195,250)">Core</text>
<text x="125" y="256" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(80,145,235)">Layout · Enums</text>

<!-- Feature Page container -->
