<text x="125" y="120" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(80,145,235)">Lazy loading</text>

