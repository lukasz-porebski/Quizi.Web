<text x="473" y="168" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(205,160,245)">Reactive Forms</text>
<text x="473" y="188" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(175,90,230)">Form Groups · Validators</text>

