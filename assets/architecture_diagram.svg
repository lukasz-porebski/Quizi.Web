<text x="314" y="236" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(205,160,245)">Factories</text>
<text x="314" y="256" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(175,90,230)">Form · Request mappers</text>

<!-- Components -->
<rect x="400" y="216" width="146" height="52" rx="8" fill="rgb(50,15,80)" stroke="rgb(175,90,230)" stroke-width="0.5"/>
<text x="473" y="236" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(205,160,245)">Components</text>
<text x="473" y="256" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(175,90,230)">Presentation</text>

<!-- HTTP Interceptor -->
<rect x="582" y="148" width="158" height="52" rx="8" fill="rgb(85,48,5)" stroke="rgb(220,145,35)" stroke-width="0.5"/>
<text x="661" y="168" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(245,190,110)">HTTP Interceptor</text>
<text x="661" y="188" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(220,145,35)">JWT · Error handling</text>

<!-- Quizi.API -->
<rect x="582" y="216" width="158" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="661" y="236" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(159,225,203)">Quizi.API</text>
<text x="661" y="256" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="11" fill="rgb(93,202,165)">REST API</text>

<!-- Arrows -->

<!-- Router → Guards -->
<line x1="125" y1="132" x2="125" y2="148" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Guards → Core -->
<line x1="125" y1="200" x2="125" y2="216" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Router → Page Component (lazy loads) -->
<line x1="195" y1="106" x2="288" y2="106" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="207" y="101" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="10" fill="rgb(156,154,146)">lazy loads</text>

<!-- Page Component → API Layer (tree branch) -->
<path d="M 375 132 L 375 142 L 314 142 L 314 148" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Page Component → Reactive Forms (tree branch) -->
<path d="M 415 132 L 415 142 L 473 142 L 473 148" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- API Layer → HTTP Interceptor (routed through gap between rows) -->
<path d="M 314 200 L 314 208 L 661 208 L 661 200" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- HTTP Interceptor → Quizi.API -->
<line x1="661" y1="200" x2="661" y2="216" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="666" y="211" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="10" fill="rgb(156,154,146)">HttpClient</text>

