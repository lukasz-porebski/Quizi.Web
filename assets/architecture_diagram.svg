<svg width="100%" viewBox="0 0 780 310" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>



<!-- App Shell container -->
<rect x="40" y="50" width="170" height="228" rx="12" fill="rgba(10,45,95,0.15)" stroke="rgb(80,145,235)" stroke-width="1" stroke-dasharray="5 3"/>
<text x="125" y="69" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif" font-size="14" font-weight="500" fill="rgb(250,249,245)">App Shell</text>

<!-- Router -->
