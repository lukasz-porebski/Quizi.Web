<lp-async-page [showSpinner]="isLoading">
  <lp-modal [text]="{ text: 'COPY_QUIZ' }">
    <lp-text-input [label]="{ text: 'CODE' }" [formControl]="code" [type]="TextInputType.Guid" />

    <div class="col d-flex justify-content-end">
      <lp-button class="me-2" [text]="{ text: 'CANCEL' }" (clicked)="cancel()" />
      <lp-button [disabled]="code.invalid" [text]="{ text: 'COPY' }" (clicked)="copy()" />
    </div>
  </lp-modal>
</lp-async-page>
